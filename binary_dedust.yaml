# binary_dedust.yaml
# LIDARDUSTX2 数据集配置文件
# 参考 binary_desnow_wads.yaml 结构，沙尘标签为 9
#
# split 策略（适合写入学术论文）：
#   每种传感器独立按 70/15/15 划分，保证 train / valid / test
#   三个集合中六种传感器均有覆盖，消除传感器分布偏差。
#
#   传感器   总序列   train   valid   test
#   ls128      17      11       3       3
#   ly300      13       9       2       2
#   ly150      19      13       3       3
#   m1         61      42       9      10
#   ls64       23      16       3       4
#   ouster     41      28       6       7
#   ─────────────────────────────────────
#   合计      174     119      26      29

name: "binary_dedust"
max_points: 250000

# ── 标签定义 ──────────────────────────────────────────────────────────────────
labels:
  0: "not-dust"
  9: "Dust"

# ── 颜色映射（bgr）────────────────────────────────────────────────────────────
color_map:
  0: [0, 0, 0]        # 黑色：非沙尘
  9: [0, 165, 255]    # 橙色：沙尘

